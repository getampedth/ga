<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daily Battle Pass Quest</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --ink: #26324d;
      --muted: #6b7895;
      --line: rgba(160, 174, 204, 0.28);
    }

    body {
      font-family: "Segoe UI", Tahoma, sans-serif;
      min-height: 100vh;
      color: var(--ink);
      padding: 28px 16px 42px;
      background:
        radial-gradient(circle at 8% 0%, rgba(255, 204, 224, 0.42), transparent 26%),
        radial-gradient(circle at 92% 4%, rgba(187, 238, 209, 0.44), transparent 28%),
        linear-gradient(135deg, #f8fbff 0%, #eef5ff 48%, #f7fff8 100%);
    }

    .page {
      width: min(1480px, 100%);
      margin: 0 auto;
    }

    .hero {
      position: relative;
      overflow: hidden;
      text-align: center;
      background: rgba(255, 255, 255, 0.94);
      border: 1px solid rgba(210, 222, 245, 0.95);
      border-radius: 28px;
      padding: 28px 24px 26px;
      box-shadow: 0 22px 60px rgba(71, 85, 120, 0.12);
      backdrop-filter: blur(14px);
      margin-bottom: 20px;
    }

    .hero::before,
    .hero::after {
      content: "";
      position: absolute;
      width: 230px;
      height: 230px;
      border-radius: 50%;
      filter: blur(10px);
      opacity: 0.35;
      pointer-events: none;
    }

    .hero::before {
      background: #ffd6e7;
      left: -90px;
      top: -110px;
    }

    .hero::after {
      background: #cae8ff;
      right: -80px;
      bottom: -120px;
    }

    .hero-badge {
      position: relative;
      z-index: 1;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      border-radius: 999px;
      background: linear-gradient(90deg, #fff2d8, #ffe8ec);
      color: #bf5d1c;
      font-size: 14px;
      font-weight: 900;
      border: 1px solid rgba(255, 178, 98, 0.38);
      margin-bottom: 12px;
    }

    h1 {
      position: relative;
      z-index: 1;
      font-size: clamp(34px, 5vw, 58px);
      line-height: 1.08;
      font-weight: 1000;
      letter-spacing: -1px;
      margin-bottom: 12px;
      background: linear-gradient(90deg, #e86b00, #d9364a, #5b55e8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    h1 span {
      font-size: clamp(20px, 3vw, 34px);
      letter-spacing: 0;
    }

    .subtitle {
      position: relative;
      z-index: 1;
      color: #43516e;
      font-size: 16px;
      line-height: 1.85;
      max-width: 820px;
      margin: 0 auto;
      font-weight: 750;
    }

    #currentDateTime {
      display: inline-block;
      margin-top: 6px;
      color: #5b48d9;
      font-size: 15px;
      font-weight: 950;
    }

    .countdown-section {
      margin: 0 0 28px;
    }

    .countdown-box {
      position: relative;
      overflow: hidden;
      max-width: 760px;
      margin: 0 auto;
      padding: 22px 22px 24px;
      border-radius: 26px;
      background: rgba(255, 255, 255, 0.94);
      border: 1px solid rgba(205, 218, 244, 0.95);
      box-shadow: 0 18px 42px rgba(80, 96, 140, 0.13);
      text-align: center;
    }

    .countdown-title {
      position: relative;
      z-index: 1;
      font-size: 15px;
      font-weight: 900;
      color: #53617f;
      margin-bottom: 10px;
    }

    .countdown-timer {
      position: relative;
      z-index: 1;
      font-size: clamp(36px, 6vw, 64px);
      font-weight: 1000;
      line-height: 1;
      letter-spacing: 2px;
      background: linear-gradient(90deg, #ff8a2a, #5b8cff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 12px;
      font-variant-numeric: tabular-nums;
    }

    .quest-flow {
      position: relative;
      z-index: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      padding: 9px 14px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.78);
      border: 1px solid rgba(185, 202, 235, 0.62);
      color: #26324d;
      font-size: 14px;
      font-weight: 900;
      margin-bottom: 14px;
    }

    .quest-flow b {
      color: #5b55e8;
    }

    .progress-wrap {
      position: relative;
      z-index: 1;
      max-width: 560px;
      margin: 0 auto;
    }

    .progress-head {
      display: flex;
      justify-content: space-between;
      color: #53617f;
      font-size: 12px;
      font-weight: 900;
      margin-bottom: 7px;
    }

    .progress-track {
      height: 14px;
      overflow: hidden;
      border-radius: 999px;
      background: #e9effb;
      border: 1px solid rgba(185, 202, 235, 0.8);
      box-shadow: inset 0 2px 6px rgba(80, 96, 140, 0.1);
    }

    .progress-fill {
      width: 0%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #ff8a2a, #ffbf4d, #5b8cff);
      box-shadow: 0 0 18px rgba(255, 138, 42, 0.38);
      transition: width 0.35s ease;
    }

    .current-section {
      margin-bottom: 36px;
    }

    .current-section .day-card-wrap {
      max-width: 820px;
      margin: 0 auto;
    }

    .current-section .day-card {
      margin-top: 20px;
      transform: scale(1.02);
    }

    .current-section .day-card:hover {
      transform: scale(1.02) translateY(-5px);
    }

    .all-list-title {
      text-align: center;
      margin: 32px 0 18px;
    }

    .all-list-title h2 {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 22px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid rgba(205, 218, 244, 0.95);
      color: #26324d;
      font-size: 20px;
      font-weight: 950;
      box-shadow: 0 12px 30px rgba(80, 96, 140, 0.1);
    }

    .all-list-title h2::before,
    .all-list-title h2::after {
      content: "";
      width: 34px;
      height: 3px;
      border-radius: 999px;
      background: linear-gradient(90deg, #ff8a2a, #5b8cff);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 18px;
      align-items: stretch;
    }

    .grid .day-card-wrap {
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .grid .day-card {
      flex: 1;
      height: 100%;
    }

    .day-card-wrap {
      position: relative;
      padding-top: 18px;
    }

    .current-ribbon {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      z-index: 5;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      width: max-content;
      max-width: calc(100% - 24px);
      padding: 8px 16px;
      border-radius: 999px;
      background: linear-gradient(135deg, #ff8a2a, #ffb84d);
      color: #fff;
      font-size: 13px;
      font-weight: 1000;
      box-shadow: 0 10px 22px rgba(255, 138, 42, 0.32);
    }

    .day-card {
      position: relative;
      overflow: hidden;
      border-radius: 26px;
      padding: 20px;
      background: rgba(255, 255, 255, 0.97);
      border: 1px solid rgba(205, 218, 244, 0.95);
      box-shadow: 0 18px 42px rgba(80, 96, 140, 0.13);
      backdrop-filter: blur(16px);
      transition: 0.25s ease;
    }

    .day-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 24px 54px rgba(80, 96, 140, 0.17);
    }

    .day-card.today {
      border-color: rgba(255, 174, 73, 0.98);
      box-shadow:
        0 0 0 3px rgba(255, 174, 73, 0.18),
        0 0 22px rgba(255, 174, 73, 0.5),
        0 0 48px rgba(255, 174, 73, 0.25),
        0 24px 54px rgba(255, 174, 73, 0.14);
      animation: glowPulse 2.2s infinite ease-in-out;
    }

    @keyframes glowPulse {
      0% {
        box-shadow:
          0 0 0 3px rgba(255, 157, 69, 0.16),
          0 0 18px rgba(255, 157, 69, 0.45),
          0 0 42px rgba(255, 157, 69, 0.22),
          0 24px 54px rgba(255, 157, 69, 0.14);
      }
      50% {
        box-shadow:
          0 0 0 4px rgba(255, 157, 69, 0.24),
          0 0 28px rgba(255, 157, 69, 0.72),
          0 0 62px rgba(255, 157, 69, 0.38),
          0 24px 54px rgba(255, 157, 69, 0.2);
      }
      100% {
        box-shadow:
          0 0 0 3px rgba(255, 157, 69, 0.16),
          0 0 18px rgba(255, 157, 69, 0.45),
          0 0 42px rgba(255, 157, 69, 0.22),
          0 24px 54px rgba(255, 157, 69, 0.14);
      }
    }

    .day-card::before {
      content: "";
      position: absolute;
      inset: 0 0 auto 0;
      height: 6px;
      background: var(--accent);
    }

    .day-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }

    .day-title {
      display: flex;
      align-items: center;
      gap: 9px;
      min-width: 0;
    }

    .day-icon {
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      border-radius: 12px;
      background: var(--soft);
      color: var(--main);
      font-size: 18px;
    }

    .day-name {
      font-size: 22px;
      font-weight: 1000;
      color: #1f2a44;
    }

    .pass-name {
      flex: 0 0 auto;
      font-size: 12px;
      color: #fff;
      background: var(--accent);
      border-radius: 999px;
      padding: 7px 10px;
      font-weight: 1000;
      box-shadow: 0 8px 18px rgba(80, 96, 140, 0.13);
    }

    .quest-list {
      display: grid;
      gap: 11px;
    }

    .quest {
      display: grid;
      grid-template-columns: 56px 1fr;
      gap: 13px;
      align-items: center;
      min-height: 110px;
      padding: 14px;
      border-radius: 20px;
      background: #ffffff;
      border: 1px solid rgba(185, 202, 235, 0.8);
      box-shadow: 0 8px 22px rgba(90, 108, 150, 0.07);
    }

    .quest-icon {
      width: 56px;
      height: 56px;
      border-radius: 18px;
      display: grid;
      place-items: center;
      font-size: 28px;
      background: var(--soft);
    }

    .quest-meta {
      display: inline-flex;
      width: fit-content;
      padding: 4px 10px;
      border-radius: 999px;
      background: var(--accent);
      color: #fff;
      font-size: 12px;
      font-weight: 1000;
      margin-bottom: 6px;
    }

    .quest-title {
      color: #1f2a44;
      font-size: 17px;
      font-weight: 800;
      line-height: 1.5;
    }

    @media (max-width: 720px) {
      body {
        padding: 16px 10px 30px;
      }

      .hero {
        padding: 28px 16px 24px;
        border-radius: 24px;
      }

      .grid {
        grid-template-columns: 1fr;
      }

      .quest {
        grid-template-columns: 48px 1fr;
        min-height: 92px;
      }

      .quest-icon {
        width: 48px;
        height: 48px;
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="hero">
      <div class="hero-badge">📅 GetAmped Daily Battle Pass</div>
      <h1>รายละเอียดเควสรายวัน<br><span>Daily Quest Details</span></h1>
      <p class="subtitle">
        เควสรีเซ็ททุกวันเวลา 17.00 น. (GMT+7)<br>
        Daily quests reset every day at 17:00 (GMT+7)<br>
        <span id="currentDateTime"></span>
      </p>
    </section>

    <section class="countdown-section">
      <div class="countdown-box">
        <div class="countdown-title">⏳ เวลาจนถึงเควสถัดไป / Time Until Next Quest</div>
        <div class="countdown-timer" id="countdownTimer">--:--:--</div>
        <div class="quest-flow" id="questFlowText"></div>
        <div class="progress-wrap">
          <div class="progress-head">
            <span>Reset Progress</span>
            <span id="progressPercent">0%</span>
          </div>
          <div class="progress-track">
            <div class="progress-fill" id="progressFill"></div>
          </div>
        </div>
      </div>
    </section>

    <section class="current-section" id="currentQuestBox"></section>

    <section class="all-list-title">
      <h2>รายการเควสทั้งหมด / All Daily Quest List</h2>
    </section>

    <section class="grid" id="questGrid"></section>
  </main>

        soft: "#ffeaf2"
      },

        accent: "linear-gradient(135deg, #22b36f, #4dd08f)",
        soft: "#e8fbf1"
      },

        accent: "linear-gradient(135deg, #ff962f, #ffb04f)",
        soft: "#fff3e5"
      },

        main: "#32b7c7",
        accent: "linear-gradient(135deg, #32b7c7, #59d1de)",
        soft: "#e9fbfd"
      },

        main: "#8b5cf6",
        accent: "linear-gradient(135deg, #8b5cf6, #a982ff)",
        soft: "#f1ebff"

        main: "#ef4444",
        accent: "linear-gradient(135deg, #ef4444, #ff7a7a)",
        soft: "#ffe8e8"
      }
    };

    const thaiDayMap = [
      "วันอาทิตย์",
      "วันจันทร์",
      "วันอังคาร",
      "วันพุธ",
      "วันพฤหัสบดี",
      "วันศุกร์",
      "วันเสาร์"
    ];

    const thaiMonthMap = [
      "มกราคม",
      "กุมภาพันธ์",
      "มีนาคม",
      "เมษายน",
      "พฤษภาคม",
      "มิถุนายน",
      "กรกฎาคม",
      "สิงหาคม",
      "กันยายน",
      "ตุลาคม",
      "พฤศจิกายน",
      "ธันวาคม"
    ];

    const gridEl = document.getElementById("questGrid");
    const currentQuestBox = document.getElementById("currentQuestBox");
    const currentDateTimeEl = document.getElementById("currentDateTime");
    const countdownTimerEl = document.getElementById("countdownTimer");
    const questFlowTextEl = document.getElementById("questFlowText");
    const progressFillEl = document.getElementById("progressFill");

    function getBangkokDate() {
      return new Date(new Date().toLocaleString("en-US", { timeZone: "Asia/Bangkok" }));
    }

    function getQuestDayName(date = getBangkokDate()) {
      let dayIndex = date.getDay();

      if (date.getHours() >= 17) {
        dayIndex = (dayIndex + 1) % 7;
      }

      return thaiDayMap[dayIndex];
    }

    function getNextQuestDayName(currentQuestDayName) {
      const currentIndex = thaiDayMap.indexOf(currentQuestDayName);
      return thaiDayMap[(currentIndex + 1) % 7];
    }

    function getNextResetDate(date = getBangkokDate()) {
      const nextReset = new Date(date);
      nextReset.setHours(17, 0, 0, 0);

      if (date.getTime() >= nextReset.getTime()) {
        nextReset.setDate(nextReset.getDate() + 1);
      }

      return nextReset;
    }

    function formatThaiDateTime(date) {
      const dayName = thaiDayMap[date.getDay()];
      const day = date.getDate();
      const month = thaiMonthMap[date.getMonth()];
      const year = date.getFullYear() + 543;
      const hour = String(date.getHours()).padStart(2, "0");
      const minute = String(date.getMinutes()).padStart(2, "0");
      const second = String(date.getSeconds()).padStart(2, "0");

      return `${dayName}ที่ ${day} ${month} ${year} เวลา ${hour}:${minute}:${second} น.`;
    }

    function applyCardColors(card, colorName) {
      const color = colorMap[colorName] || colorMap.monday;
      card.style.setProperty("--main", color.main);
      card.style.setProperty("--accent", color.accent);
      card.style.setProperty("--soft", color.soft);
    }

    function createQuestHTML(quest) {
      return `
        <div class="quest">
          <div class="quest-icon">${quest.icon}</div>
          <div>
            <div class="quest-meta">เควส ${quest.no}</div>
            <div class="quest-title">${quest.text}</div>
          </div>
        </div>
      `;
    }

    function buildDayCard(item, isCurrent = false) {
      const wrap = document.createElement("div");
      wrap.className = "day-card-wrap";

      if (isCurrent) {
        wrap.innerHTML = `<div class="current-ribbon">🔥 เควสปัจจุบัน / Current Quest</div>`;
      }

      const card = document.createElement("article");
      card.className = "day-card" + (isCurrent ? " today" : "");
      applyCardColors(card, item.color);

      card.innerHTML = `
        <div class="day-head">
          <div class="day-title">
            <div class="day-icon">📅</div>
            <div class="day-name">${item.day}</div>
          </div>
          <div class="pass-name">${item.pass}</div>
        </div>
        <div class="quest-list">
          ${item.quests.map(createQuestHTML).join("")}
        </div>
      `;

      wrap.appendChild(card);
      return wrap;
    }

    function renderAll() {
      const now = getBangkokDate();
      const currentQuestDayName = getQuestDayName(now);
      const currentItem = dailyQuests.find(item => item.day === currentQuestDayName);

      currentQuestBox.innerHTML = "";
      gridEl.innerHTML = "";

      if (currentItem) {
        currentQuestBox.appendChild(buildDayCard(currentItem, true));
      }

      dailyQuests.forEach(item => {
        gridEl.appendChild(buildDayCard(item, item.day === currentQuestDayName));
      });
    }

    function updateDateTimeAndCountdown() {
      const now = getBangkokDate();
      const currentQuestDayName = getQuestDayName(now);
      const nextQuestDayName = getNextQuestDayName(currentQuestDayName);
      const nextReset = getNextResetDate(now);
      const diff = Math.max(0, nextReset.getTime() - now.getTime());

      const hours = Math.floor(diff / (1000 * 60 * 60));
      const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
      const seconds = Math.floor((diff % (1000 * 60)) / 1000);
      const pad = num => String(num).padStart(2, "0");

      const totalCycle = 24 * 60 * 60 * 1000;
      const elapsed = totalCycle - diff;
      const progress = Math.min(100, Math.max(0, (elapsed / totalCycle) * 100));

      currentDateTimeEl.textContent = `เวลาปัจจุบัน: ${formatThaiDateTime(now)} (เวลาไทย)`;
      countdownTimerEl.textContent = `${pad(hours)}:${pad(minutes)}:${pad(seconds)}`;
      questFlowTextEl.innerHTML = `Current: <b>${currentQuestDayName}</b> <span>→</span> Next: <b>${nextQuestDayName}</b>`;
      progressFillEl.style.width = `${progress}%`;
      progressPercentEl.textContent = `${Math.floor(progress)}%`;
    }

    let lastRenderedQuestDay = "";

    function tick() {
      const currentQuestDayName = getQuestDayName();

      if (currentQuestDayName !== lastRenderedQuestDay) {
        renderAll();
        lastRenderedQuestDay = currentQuestDayName;
      }

      updateDateTimeAndCountdown();
    }

    tick();
    setInterval(tick, 1000);
  </script>
</body>
</html>
